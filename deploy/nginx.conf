# FW Agent — Production nginx config (non-Docker / bare EC2)
#
# Usage:
#   1. Build the frontend:  cd ui && pnpm build
#   2. Start the API:       cd agent && uvicorn server:app --host 127.0.0.1 --port 8000
#   3. Adapt the root path below to point to your ui/dist directory
#   4. Start nginx:         sudo nginx -c /path/to/this/file

server {
    listen 80;
    server_name _;

    root /path/to/agent/ui/dist;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }

    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
