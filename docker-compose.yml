version: '3.9'

services:
  # FastAPI Backend
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: langchain-agent
    ports:
      - "8000:8000"
    env_file:
      - ./agent/.env
    networks:
      - langchain-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Astro Frontend
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: langchain-ui
    ports:
      - "4321:4321"
    env_file:
      - ./ui/.env
    depends_on:
      - agent 
    networks:
      - langchain-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4321/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  langchain-network:
    driver: bridge
