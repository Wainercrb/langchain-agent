services:
  # FastAPI Backend
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: langchain-agent
    expose:
      - "8000"
    env_file:
      - ./agent/.env
    networks:
      - langchain-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/system/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # nginx — serves frontend + proxies API
  nginx:
    build:
      context: .
      dockerfile: deploy/nginx.Dockerfile
    container_name: langchain-nginx
    ports:
      - "80:80"
    depends_on:
      - agent
    networks:
      - langchain-network
    restart: unless-stopped

networks:
  langchain-network:
    driver: bridge
